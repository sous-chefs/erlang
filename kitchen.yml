---
driver:
  name: vagrant

transport:
  max_wait_until_ready: 600
  connection_retries: 10
  connection_retry_sleep: 10

provisioner:
  name: chef_infra
  product_name: chef
  product_version: latest
  channel: stable
  chef_license: accept
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true

verifier:
  name: inspec
  sudo: true

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: centos-stream-9
  - name: debian-12
  - name: debian-13
  - name: fedora-latest
  - name: rockylinux-8
  - name: rockylinux-9
  - name: ubuntu-22.04
  - name: ubuntu-24.04

x-run_lists:
  default: &default_run_list
    - recipe[test::default]
  source: &source_run_list
    - recipe[test::source]

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default
  source: &source_verifier
    inspec_tests:
      - path: test/integration/source

suites:
  - name: default
    run_list: *default_run_list
    verifier: *default_verifier

  - name: source
    run_list: *source_run_list
    verifier: *source_verifier
